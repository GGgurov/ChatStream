<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        
        .grid { 
            display: grid; 
            /* 50 на 50 ширины для чатов, 150px высота для донатов внизу */
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 150px; 
            height: 100vh;
            gap: 4px;
        }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Донаты занимают всю нижнюю строку */
        .donations-row { 
            grid-column: 1 / 3; 
            grid-row: 2 / 3;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="grid">
        <iframe src="https://www.twitch.tv/popout/elgurov/chat" title="twitch"></iframe>
        
        <iframe src="https://tikfinity.zerody.one/widget/activity-feed?cid=2916765&did=1" title="tiktok"></iframe>
        
        <iframe class="donations-row" src="https://www.donationalerts.com/dashboard/last-donations" title="donations"></iframe>
    </div>
</body>
</html>
