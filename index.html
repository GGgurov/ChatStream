<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 120px; 
            height: 100vh; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        .donations { grid-column: 1 / 3; }
    </style>
</head>
<body>
    <div class="grid">
        <iframe src="https://www.twitch.tv/popout/elgurov/chat" title="twitch"></iframe>
        
        <iframe src="https://tikfinity.zerody.one/widget/activity-feed?cid=2916765&did=1" title="tiktok"></iframe>
        
        <iframe class="donations" src="https://www.donationalerts.com/dashboard/last-donations" title="donations"></iframe>
    </div>
</body>
</html>
