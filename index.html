<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 колонки сверху */
            grid-template-rows: 1fr 150px;  /* 150px высота для донатов снизу */
            height: 100vh;
        }

        .chat-left { grid-column: 1 / 2; grid-row: 1 / 2; }
        .chat-right { grid-column: 2 / 3; grid-row: 1 / 2; }
        .donations { grid-column: 1 / 3; grid-row: 2 / 3; border-top: 2px solid #333; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Твич слева -->
        <div class="chat-left">
            <iframe src="https://www.twitch.tv/popout/elgurov/chat"></iframe>
        </div>
        <!-- ТикТок справа -->
        <div class="chat-right">
            <iframe src="https://tikfinity.zerody.one/widget/activity-feed?cid=2916765&did=1"></iframe>
        </div>
        <!-- Донаты внизу на всю ширину -->
        <div class="donations">
            <iframe src="https://www.donationalerts.com/widget/lastdonations?limit=100"></iframe>
        </div>
    </div>
</body>
</html>
