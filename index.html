<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Dashboard</title>
    <!-- Подключаем Unbounded из Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #0f1012; /* Глубокий темный фон */
            font-family: 'Unbounded', sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex-grow: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Панель Twitch -->
    <div class="panel">
        <div class="panel-header">Twitch Chat</div>
        <iframe src="https://www.twitch.tv/popout/elgurov/chat"></iframe>
    </div>

    <!-- Панель TikTok (Tikfinity) -->
    <div class="panel">
        <div class="panel-header">TikTok Feed</div>
        <iframe src="https://tikfinity.zerody.one/widget/activity-feed?cid=2916765&did=1"></iframe>
    </div>
</div>

</body>
</html>
